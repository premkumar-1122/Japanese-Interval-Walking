name: Package & Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to generate release notes from commits

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        run: |
          if [ -f "keystore-base64.txt" ]; then
            base64 --decode keystore-base64.txt > ${{ github.workspace }}/my-upload-key.jks
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/my-upload-key.jks
          fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Release AAB
        run: |
          ./gradlew :app:bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename Artifacts
        run: |
          # Set tag name based on event trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

          # Rename APK and AAB with version in filename
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/japanese-interval-walking-${TAG_NAME}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/japanese-interval-walking-${TAG_NAME}.aab

      - name: Generate Changelog
        id: changelog
        run: |
          # Fetch all tags so git describe works correctly
          git fetch --tags --force

          # Determine the previous tag to get commit history in between
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then RANGE="HEAD"; else RANGE="${PREV_TAG}..HEAD"; fi

          {
            echo "# Japanese Interval Walking — ${TAG_NAME}"
            echo ""
            echo "### 🚀 Features & Improvements"
            feat=$(git log $RANGE --pretty=format:"%s" | grep -iE '^(feat|feature)' || true)
            if [ -n "$feat" ]; then echo "$feat" | sed -E 's/^(feat(\([^)]*\))?:\s*|feature:\s*)//I' | sed 's/^/* /'; else echo "* (none)"; fi
            echo ""
            echo "### 🛠️ Bug Fixes"
            fix=$(git log $RANGE --pretty=format:"%s" | grep -iE '^(fix|bugfix|hotfix)' || true)
            if [ -n "$fix" ]; then echo "$fix" | sed -E 's/^(fix(\([^)]*\))?:\s*|bugfix:\s*|hotfix:\s*)//I' | sed 's/^/* /'; else echo "* (none)"; fi
            echo ""
            echo "### 🧹 Chores & Maintenance"
            chore=$(git log $RANGE --pretty=format:"%s" | grep -iE '^(chore|refactor|docs|style|test|perf|build|ci)' || true)
            if [ -n "$chore" ]; then echo "$chore" | sed -E 's/^[a-z]+(\([^)]*\))?:\s*//I' | sed 's/^/* /'; else echo "* (none)"; fi
            echo ""
            echo "### 📝 Other"
            other=$(git log $RANGE --pretty=format:"%s" | grep -ivE '^(feat|feature|fix|bugfix|hotfix|chore|refactor|docs|style|test|perf|build|ci)' || true)
            if [ -n "$other" ]; then echo "$other" | sed 's/^/* /'; else echo "* (none)"; fi
            echo ""
            echo "### 📦 Assets"
            echo "* \`japanese-interval-walking-${TAG_NAME}.apk\` — installable release APK"
            echo "* \`japanese-interval-walking-${TAG_NAME}.aab\` — Android App Bundle (Play Store)"
          } > release_notes.md
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          body_path: release_notes.md
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/japanese-interval-walking-${{ env.TAG_NAME }}.apk
            app/build/outputs/bundle/release/japanese-interval-walking-${{ env.TAG_NAME }}.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
