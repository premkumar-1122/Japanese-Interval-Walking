AutoName: JIW Tracker
Description: |-
  JIW Tracker is an open-source fitness app that implements the
  Shinshu University-style interval walking protocol. Alternating
  between slow recovery walks and fast burn walks, this
  scientifically-backed method helps improve cardiovascular fitness
  and burn calories effectively.

  Key Features:
  * Interval Walking Workouts: Customizable slow/fast duration cycles
  * Real-time Voice Coaching: Audio cues in English and Japanese
  * Step Tracking: Hardware step counter sensor for accuracy
  * Calorie Calculation: MET-based burn estimation
  * Health Connect Sync: Sync to Health Connect
  * Detailed Session History: Track cadence, pace, calories, duration
  * Japanese Language Support: Full Japanese UI and voice cues
  * Light & Dark Theme: Automatic system theme support
  * No account required, no data collection, fully offline

